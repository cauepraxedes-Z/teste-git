<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Perfil do GitHub</title>

    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/styles.css">
    <link rel="stylesheet" href="./src/css/animations.css">
    <link rel="stylesheet" href="./src/css/responsive.css">
  

</head>
<body>
    <main>
        <i class="devicon-github-original"></i>

        <section class="container">
            <header>
                <h2>Buscar Usuário</h2>
                <p class="search-hint">Digite o nome de usuário do GitHub e tenha acesso aos dados do perfil</p>
                <input type="text" id="input-search" placeholder="Digite o nome do usuário no GitHub">

                <input type="button" value="Buscar" id="btn-search">

                <!-- container de alert (mensagens in-page) -->
                <div id="alert-container" class="alert" aria-live="polite" style="margin-top:12px;color:#b00;"></div>
            </header>

            <div class="profile-results" id="profile-results">
                <!-- Os dados aparecerão aqui via JS -->
            </div>
        </section>
    </main>
    <!-- Carrega como módulo ES6 (entrypoint separado) -->
    <script type="module" src="./src/main.js"></script>
</body>
</html>
